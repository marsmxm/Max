name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and analyse default scheme using xcodebuild command
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install libsndfile libcdio-paranoia musepack wavpack libcue mad flac libogg speex libvorbis lame taglib
      - name: Fix framework header symlinks
        run: |
          BREW_INC="$(brew --prefix)/include"
          find Frameworks -type l | while IFS= read -r lnk; do
            if [ ! -e "$lnk" ]; then
              target="$(readlink "$lnk")"
              if echo "$target" | grep -qE '^\.\./Cellar/'; then
                header="$(echo "$target" | sed -E 's|^\.\./Cellar/[^/]+/[^/]+/include/||')"
                new_target="$BREW_INC/$header"
                ln -sf "$new_target" "$lnk"
              fi
            fi
          done
      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default | cat >default
          echo Using default scheme: $default
      - name: Build
        env:
          scheme: ${{ 'default' }}
        run: |
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          xcodebuild clean build analyze \
            -scheme "$scheme" \
            -"$filetype_parameter" "$file_to_build" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
