name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build archive
        run: |
          xcodebuild \
            -scheme Max \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Max.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export app
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Max.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/release" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package zip
        run: |
          cd "$RUNNER_TEMP/release"
          zip -r "$RUNNER_TEMP/Max-${{ github.ref_name }}.zip" Max.app

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Max-Reborn ${{ github.ref_name }}
          files: ${{ runner.temp }}/Max-${{ github.ref_name }}.zip
          generate_release_notes: true
