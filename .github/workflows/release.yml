name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install libsndfile libcdio-paranoia musepack wavpack libcue mad flac libogg speex libvorbis lame taglib

      - name: Fix framework header symlinks
        run: |
          BREW_INC="$(brew --prefix)/include"
          find Frameworks -type l | while IFS= read -r lnk; do
            if [ ! -e "$lnk" ]; then
              target="$(readlink "$lnk")"
              if echo "$target" | grep -qE '^\.\./Cellar/'; then
                header="$(echo "$target" | sed -E 's|^\.\./Cellar/[^/]+/[^/]+/include/||')"
                new_target="$BREW_INC/$header"
                ln -sf "$new_target" "$lnk"
              fi
            fi
          done

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build archive
        run: |
          xcodebuild \
            -scheme Max \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Max.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Extract and sign app
        run: |
          cp -r "$RUNNER_TEMP/Max.xcarchive/Products/Applications/Max.app" "$RUNNER_TEMP/Max.app"
          # Sign all frameworks and dylibs first, then the app bundle
          find "$RUNNER_TEMP/Max.app/Contents/Frameworks" -name "*.framework" -o -name "*.dylib" 2>/dev/null | \
            xargs -I{} codesign --force --sign - {}
          codesign --deep --force --sign - "$RUNNER_TEMP/Max.app"

      - name: Package zip
        run: |
          cd "$RUNNER_TEMP"
          zip -r "Max-${{ github.ref_name }}.zip" Max.app

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Max-Reborn ${{ github.ref_name }}
          files: ${{ runner.temp }}/Max-${{ github.ref_name }}.zip
          generate_release_notes: true
