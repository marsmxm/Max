name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install libsndfile libcdio-paranoia musepack wavpack libcue mad flac libogg speex libvorbis lame taglib

      - name: Fix framework header symlinks
        run: |
          BREW_INC="$(brew --prefix)/include"
          find Frameworks -type l | while IFS= read -r lnk; do
            if [ ! -e "$lnk" ]; then
              target="$(readlink "$lnk")"
              if echo "$target" | grep -qE '^\.\./Cellar/'; then
                header="$(echo "$target" | sed -E 's|^\.\./Cellar/[^/]+/[^/]+/include/||')"
                new_target="$BREW_INC/$header"
                ln -sf "$new_target" "$lnk"
              fi
            fi
          done

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build archive
        run: |
          xcodebuild \
            -scheme Max \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Max.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Extract and package app
        run: |
          # Find Max.app wherever xcodebuild placed it in the xcarchive
          APP_PATH=$(find "$RUNNER_TEMP/Max.xcarchive/Products" -name "Max.app" -maxdepth 6 | head -1)
          echo "Found app at: $APP_PATH"
          # Use ditto (handles symlinks properly unlike cp -r)
          ditto "$APP_PATH" "$RUNNER_TEMP/Max.app"
          # Strip framework Headers dirs — not needed at runtime, and they
          # contain stale Homebrew symlinks that bloat the bundle
          find "$RUNNER_TEMP/Max.app/Contents/Frameworks" -path "*/Headers" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$RUNNER_TEMP/Max.app/Contents/Frameworks" -name "Headers" -type l -delete 2>/dev/null || true
          # Re-sign with ad-hoc identity
          find "$RUNNER_TEMP/Max.app/Contents/Frameworks" -name "*.framework" 2>/dev/null | \
            while IFS= read -r fw; do codesign --force --sign - "$fw"; done
          codesign --deep --force --sign - "$RUNNER_TEMP/Max.app"

      - name: Package zip
        run: |
          cd "$RUNNER_TEMP"
          zip -ry "Max-${{ github.ref_name }}.zip" Max.app

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Max-Reborn ${{ github.ref_name }}
          files: ${{ runner.temp }}/Max-${{ github.ref_name }}.zip
          generate_release_notes: true
