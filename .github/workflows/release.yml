name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install libsndfile libcdio-paranoia musepack wavpack libcue mad flac libogg speex libvorbis lame taglib

      - name: Fix framework header symlinks
        run: |
          BREW_INC="$(brew --prefix)/include"
          find Frameworks -type l | while IFS= read -r lnk; do
            if [ ! -e "$lnk" ]; then
              target="$(readlink "$lnk")"
              if echo "$target" | grep -qE '^\.\./Cellar/'; then
                header="$(echo "$target" | sed -E 's|^\.\./Cellar/[^/]+/[^/]+/include/||')"
                new_target="$BREW_INC/$header"
                ln -sf "$new_target" "$lnk"
              fi
            fi
          done

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build archive
        run: |
          xcodebuild \
            -scheme Max \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Max.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export app
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Max.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/release" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package zip
        run: |
          cd "$RUNNER_TEMP/release"
          zip -r "$RUNNER_TEMP/Max-${{ github.ref_name }}.zip" Max.app

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Max-Reborn ${{ github.ref_name }}
          files: ${{ runner.temp }}/Max-${{ github.ref_name }}.zip
          generate_release_notes: true
